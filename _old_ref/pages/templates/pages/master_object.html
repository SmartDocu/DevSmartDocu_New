{% extends "pages/base.html" %}
{% block title %}항목 관리{% endblock %}

{% load static %}

{% block content %}
<style>
  .object_label {
    width: 100px; 
    display: block;
    margin-block-start: 1em;
    margin-block-end: 1em;
    margin-inline-start: 0px;
    margin-inline-end: 0px;
    unicode-bidi: isolate;
  }

  .object_value {
    width: 350px; 
    display: block;
    margin-block-start: 1em;
    margin-block-end: 1em;
    margin-inline-start: 0px;
    margin-inline-end: 0px;
    unicode-bidi: isolate;
    margin-left: 5px;
  }

  .info{
    text-align: center;
  }

.objecttype-group {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 20px; /* 세로 8px, 가로 20px 간격 */
  max-width: 400px;
}

.objecttype-group .radio-inline {
  width: calc(33.3% - 20px); /* 한 줄에 3개씩 */
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.objecttype-group input[type="radio"] {
  margin-right: 5px;
}
 
</style>

<!-- <div class="page-title">
  <div class="gradient-bar"></div>
  항목 관리
</div> -->

<div class="page-title">
  <div style="display: flex; align-items: center;">
    <div class="gradient-bar"></div>
    <div>항목 관리</div>
  </div>

  <button type="button" class="icon-btn" id="back-btn">
    <img src="{% static 'icons/back.svg' %}" alt="뒤로가기" class="icon-img config-icon">
  </button>
</div>


<div style="display: flex; gap: 20px; min-height: 80%;">
  <!-- 좌측 패널 -->
  <div style="flex: 0.15; padding-right: 20px;">
    <h3>챕터 목록</h3>
    <div id="chapter-card-container" class="chapter-card-container">
      <!-- JavaScript로 동적으로 카드 생성 -->
    </div>
  </div>

  <div style="flex: 0.55; padding: 0 20px;">
    <h3>항목 목록</h3>
    <div class="table-container">
      <table class="table table-bordered table-sm" >
        <thead>
          <tr>
            <th style="width: 10%;">순번</th>
            <th style="width: 15%;">항목명</th>
            <th style="width: 14%;">항목구분</th>
            <th style="width: 35%;">설명</th>
            <th style="width: 13%;">항목설정</th>
            <th style="width: 13%;">사용</th>
            <!-- <th style="width: 10%;"></th> -->
          </tr>
        </thead>
        <tbody id="object-table-body">
          <!-- JavaScript로 동적으로 채워짐 -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- 우측 패널 -->
  <div style="flex: 0.3; padding-left: 20px;">
    <h3>항목 상세</h3>
    <form id="item-detail-form" style="width: 90%;">
      <input type="hidden" id="objectuid" name="objectuid" />
      <input type="hidden" id="chapteruid" name="chapteruid" value="">

      <div class="form-group-left">
        <span class="object_label">항목명</span>
        <span class="object_value" id="objectnm"></span>
      </div>

      <div class="form-group-left">
        <label class="object_label" for="objectdesc">항목설명</label>
        <textarea class="form-control object_value" id="objectdesc" name="objectdesc" spellcheck="false" style="resize: none; height: 80%;"></textarea>
      </div>

      <div class="form-group-left" style="height: 80px;">
        <label class="object_label">항목구분</label>
        <input id="objecttypecd_orig" hidden>
        <div style="display: grid; gap: 18%; height: 70%;">
          <div style="height: 44%;">
            <img src="{% static 'icons/make_ui.svg' %}" class="icon-img-tbl" title="UI">
          </div>
          <div style="height: 44%;">
            <img src="{% static 'icons/make_ai.svg' %}" class="icon-img-tbl" title="AI">
          </div>
        </div>
        <div class="object_value objecttype-group" id="objecttypecd" style="width: 300px">
          {% for obj in objecttype %}
            <label class="radio-inline">
              <input type="radio" name="objecttypecd" value="{{ obj.objecttypecd }}">
              {{ obj.objecttypenm }}
            </label>
          {% endfor %}
        </div>
      </div>

      <div class="form-group-left" style = "display: block;">
        <label for="useyn">사용</label>
        <input id="useyn" name="useyn" type="checkbox" style="margin-left: 80px;">
      </div>

      <div class="form-group-left">
        <label class="object_label" for="orderno">순번</label>
        <input class="object_value" id="orderno" name="orderno" type="number" style="height: 25px;" >
      </div>

      <div class="form-group-left">
        <span class="object_label">생성자</span>
        <span class="object_value" id="creatornm" ></span>
      </div>

      <div class="form-group-left">
        <span class="object_label">생성일시</span>
        <span class="object_value"  id="createdts" ></span>
      </div>

      <div class="form-group-left" style="justify-content: center; display: flex; gap: 8px;">
        {% if user.editbuttonyn == 'Y' %}
          <!-- 저장 버튼 -->
          <button id="save-btn" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/save.svg' %}" class="icon-img save-icon" title="저장">
              <span class="icon-label">저장</span>
            </div>
          </button>

          <!-- 삭제 버튼 -->
          <button id="delete-btn" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/delete.svg' %}" class="icon-img del-icon" title="삭제">
              <span class="icon-label">삭제</span>
            </div>
          </button>
        {% endif %}

        <!-- 설정 버튼 -->
        <button id="config-btn" type="button" class="icon-btn">
          <div class="icon-wrapper">
            <img src="{% static 'icons/object-config.svg' %}" class="icon-img config-icon" title="항목 설정 이동">
            <span class="icon-label">항목 설정</span>
          </div>
        </button>
      </div>

</div>


    </form>
  </div>
</div>

<script>
// Django에서 전달받은 데이터를 JavaScript 변수로 저장
const allChapters = {{ all_chapters|safe }};
const allObjects = {{ all_objects|safe }};
const docid = '{{ docid }}';  // 뷰에서 전달받은 docid
let currentObjects = [];

// 페이지 로드 시 초기화
document.addEventListener('DOMContentLoaded', function() {
  initializeChapterCards();

  // URL 파라미터나 서버에서 전달받은 기본 chapteruid
  const defaultChapterUid = "{{ chapteruid|default:'' }}";

  if (defaultChapterUid) {
    const defaultCard = document.querySelector(`.chapter-card[data-chapteruid="${defaultChapterUid}"]`);
    if (defaultCard) {
      defaultCard.classList.add('selected');
      onChapterChange(defaultChapterUid);
    }
  }
});

// 챕터 카드 초기화
function initializeChapterCards() {
  const container = document.getElementById('chapter-card-container');
  container.innerHTML = '';

  if (docid && allChapters[docid]) {
    allChapters[docid].forEach(chapter => {
      const card = document.createElement('div');
      card.className = 'chapter-card';

      // ✅ 핵심
      card.dataset.chapteruid = chapter.chapteruid;
      card.dataset.useyn = String(chapter.useyn); // "true" / "false"

      // ✅ card-title 구조 유지
      card.innerHTML = `
        <div class="card-title">${chapter.chapternm}</div>
      `;

      card.addEventListener('click', () => {
        document.querySelectorAll('.chapter-card')
          .forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        onChapterChange(chapter.chapteruid);
      });

      container.appendChild(card);
    });
  }
}

function onChapterChange(selectedChapterUid) {
  // 선택한 챕터 UID를 숨겨진 input에 저장
  document.getElementById("chapteruid").value = selectedChapterUid;

  if (selectedChapterUid && allObjects[selectedChapterUid]) {
    currentObjects = [...allObjects[selectedChapterUid]];
    // 순번(orderNo) 기준 정렬 (숫자, 없으면 뒤로)
    currentObjects.sort((a, b) => {
      const aOrder = a.orderno !== undefined && a.orderno !== null ? Number(a.orderno) : 9999;
      const bOrder = b.orderno !== undefined && b.orderno !== null ? Number(b.orderno) : 9999;
      return aOrder - bOrder;
    });

    updateObjectTable(currentObjects);

    const defaultObjectUid = "{{ objectuid|default:'' }}";
    if (defaultObjectUid) {
      // console.log('ObjectUID: ', defaultObjectUid)
      selectObjectRow(defaultObjectUid);
    } else {
      resetItemDetailForm();  
    }
  } else {
    currentObjects = [];
    updateObjectTable([]);
    resetItemDetailForm();
  }
}

// objectuid 가 있을 시 해당 로우 클릭 처리
function selectObjectRow(objectUid){
  const row = document.querySelector(`#object-table-body tr[data-objectuid="${objectUid}"]`);

  if (row) {
    // console.log('체크??')
    // console.log(row)
    row.click();
  }
}

// 상세 영역 초기화 함수
function resetItemDetailForm() {
  document.getElementById("objectuid").value = "";
  document.getElementById("objectnm").textContent = "";
  document.getElementById("objectdesc").value = "";
  document.querySelectorAll("input[name='objecttypecd']").forEach(r => r.checked = false);
  document.getElementById("objecttypecd_orig").value = "";
  document.getElementById("useyn").checked = false;
  document.getElementById("orderno").value = "";
  document.getElementById("creatornm").textContent = "";
  document.getElementById("createdts").textContent = "";

  // 선택된 행 강조 초기화
  document.querySelectorAll("#object-table-body tr").forEach(tr => tr.classList.remove("selected-row"));
}

function updateObjectTable(objects) {
  const tbody = document.getElementById('object-table-body');
  tbody.innerHTML = '';

  objects.forEach(item => {
    const row = document.createElement('tr');
    row.setAttribute('data-objectuid', item.objectuid);
    row.setAttribute('data-objectnm', item.objectnm);
    row.setAttribute('data-objecttypecd', item.objecttypecd);
    row.setAttribute('data-objecttypenm', item.objecttypenm);
    row.setAttribute('data-objecttypenm_full', item.objecttypenm_full);
    row.setAttribute('data-objectdesc', item.objectdesc);
    row.setAttribute('data-objectsettingyn', item.objectsettingyn);
    row.setAttribute('data-orderno', item.orderno);
    row.setAttribute('data-useyn', item.useyn);
    row.setAttribute('data-creatornm', item.creatornm);
    row.setAttribute('data-createdts', item.createdts);

    // 행 내용 (선택 버튼 제거)
    row.innerHTML = `
      <td class="info">${item.orderno || ""}</td>
      <td>${item.objectnm}</td>
      <td class="info">${item.objecttypenm || ""}</td>
      <td class="multiline" style="white-space: pre-wrap; word-break: break-word;">${item.objectdesc || ""}</td>
      <td class="info">${item.objectsettingyn ? "예" : "아니오"}</td>
      <td class="info" style="text-align: center;">${item.useyn ? "✔" : ""}</td>
    `;

    // 마우스 포인터와 클릭 이벤트 추가
    row.style.cursor = "pointer";
    row.addEventListener("click", function () {
      document.getElementById("objectuid").value = row.dataset.objectuid;
      document.getElementById("objectnm").textContent = row.dataset.objectnm;
      document.getElementById("objectdesc").value = row.dataset.objectdesc;
      document.getElementById("objecttypecd_orig").value = row.dataset.objecttypecd
      document.querySelectorAll("input[name='objecttypecd']").forEach(r => {
        r.checked = (r.value === row.dataset.objecttypecd);
      });
      document.getElementById("useyn").checked = row.dataset.useyn === "true";
      document.getElementById("orderno").value = row.dataset.orderno;
      document.getElementById("creatornm").textContent = row.dataset.creatornm;
      document.getElementById("createdts").textContent = row.dataset.createdts;

      // 클릭된 행 강조
      document.querySelectorAll("#object-table-body tr").forEach(tr => tr.classList.remove("selected-row"));
      row.classList.add("selected-row");
    });

    tbody.appendChild(row);
  });
}


// 저장 버튼 (기존 코드와 동일)
const saveBtn = document.getElementById("save-btn");
if (saveBtn) {
  saveBtn.addEventListener("click", async () => {
    // 현재 선택된 챕터 카드에서 chapteruid 가져오기
    const selectedCard = document.querySelector(".chapter-card.selected");
    if (!selectedCard) {
      alert("챕터를 선택해주세요.");
      return;
    }
    const chapteruid = selectedCard.dataset.chapteruid;
    // const chapteruid = document.getElementById("chapteruid").value;
    const objectuid = document.getElementById("objectuid").value;
    const objectdesc = document.getElementById("objectdesc").value;
    const objecttypecd_orig = document.getElementById("objecttypecd_orig").value;
    const objecttypecd = document.querySelector("input[name='objecttypecd']:checked")?.value || "";
    const useyn = document.getElementById("useyn").checked;
    const orderno = document.getElementById("orderno").value;
    
    const data = {
      chapteruid: chapteruid,
      objectuid: objectuid,
      objectdesc: objectdesc,
      objecttypecd_orig: objecttypecd_orig,
      objecttypecd: objecttypecd,
      useyn: useyn,
      orderno: orderno
    }

    // console.log(objecttypecd_orig)

    if (objecttypecd != objecttypecd_orig && objecttypecd_orig != "") {
      if(!confirm('항목 구분 변경 시 기존 설정은 초기화 됩니다.\n그래도 하시겠습니까?')) return;
    }

    fetch("{% url 'master_object_save_object' %}", {
      method: "POST",
      credentials: "include",   // 👈 여기
      body: JSON.stringify(data),
      headers: {
        "X-CSRFToken": getCookie("csrftoken")
      }
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === "success") {
        alert("저장되었습니다.");

        // const docid = document.getElementById("docid").value;
        const chapteruid = document.getElementById("chapteruid").value;

        // 선택값을 쿼리 파라미터로 붙여서 리로드
        const newUrl = new URL(window.location.href);
        // newUrl.searchParams.set('docid', docid);
        newUrl.searchParams.set('chapteruid', chapteruid);

        window.location.href = newUrl.toString();
      } else {
        alert("저장 실패: " + (data.message || "서버 오류"));
      }
    })
    .catch(err => {
      alert("오류 발생: " + err.message);
    });
  });
}

// 삭제 버튼 (기존 코드와 동일)
const deleteBtn = document.getElementById("delete-btn");
if (deleteBtn) {
  document.getElementById("delete-btn").addEventListener("click", async () => {
    const objectuid = document.getElementById("objectuid").value

    if (!objectuid) {
      alert("삭제할 항목을 선택하세요.");
      return;
    }

    if (!confirm("정말 삭제하시겠습니까?")) return;

    fetch("{% url 'master_object_delete_object' %}", {
      method: "POST",
      credentials: "include",   // 👈 여기
      body: JSON.stringify({ objectuid: objectuid }),
      headers: {
        "X-CSRFToken": getCookie("csrftoken")
      }
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === "success") {
        alert("삭제되었습니다.");
        location.reload();
      } else {
        alert("삭제 실패: " + (data.message || "서버 오류"));
      }
    })
    .catch(err => {
      alert("오류 발생: " + err.message);
    });
  });
}

// 내용 설정 버튼 (기존 코드와 동일)
document.getElementById("config-btn").addEventListener("click", () => {
  const objectuid = document.getElementById("objectuid").value;
  const objectnm = document.getElementById("objectnm").textContent;
  const id = objectuid.value;

  // 실제로 선택된 행이 있는지 확인
  const selectedRow =
    document.querySelector("#object-table-body tr.selected-row");

  if (!objectuid || !selectedRow) {
    alert("항목 목록에서 항목을 선택하세요.");
    return;
  }

  // const docid = document.getElementById("docid").value
  // const chapteruid = document.getElementById("chapteruid").value
  const selectedCard = document.querySelector(".chapter-card.selected");
  if (!selectedCard) {
    alert("챕터를 선택해주세요.");
    return;
  }
  const chapteruid = selectedCard.dataset.chapteruid;

  // const objecttypecd = document.getElementById("objecttypecd").value
  const objecttypecd = document.querySelector("input[name='objecttypecd']:checked")?.value || "";

  let url = "";
  if (["TU"].includes(objecttypecd)){
    url = `/master/tables/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  } 
  else if (["CU"].includes(objecttypecd)){
    url = `/master/charts/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  } 
  else if (["SU"].includes(objecttypecd)){
    url = `/master/sentences/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  } 
  else if (["TA"].includes(objecttypecd)){
    url = `/master/ai_tables/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  }
  else if (["CA"].includes(objecttypecd)){
    url = `/master/ai_charts/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  }
  else if (["SA"].includes(objecttypecd)){
    url = `/master/ai_sentences/?chapteruid=${chapteruid}&objectnm=${encodeURIComponent(objectnm)}`;
  }

  // 현재 창 이동
  if (url) {
    window.location.href = url;
  }
});

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.substring(0, name.length + 1) === (name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

document.getElementById("back-btn").addEventListener("click", () => {
  const chapteruid = document.getElementById("chapteruid").value; // 현재 선택된 챕터UID
  const chapter_object_chapteruid = sessionStorage.getItem('chapter_object_chapteruid')

  if (chapter_object_chapteruid) {
    window.location.href =
      `/master/chapters/?chapteruid=${chapter_object_chapteruid}`;
  } else {
    window.location.href =
      `/master/chapter_template/?chapteruid=${chapteruid}`;
  }
});


function restoreSelectedObject() {
    const objectuid =
        new URLSearchParams(window.location.search).get("objectuid");

    if (!objectuid) return;

    document
        .querySelectorAll("#object-table-body tr")
        .forEach(row => {
            if (row.dataset.objectuid === objectuid) {
                row.classList.add("selected");
            }
        });
}


</script>
{% endblock %}
