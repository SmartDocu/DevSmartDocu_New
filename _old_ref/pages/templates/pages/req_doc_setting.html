{% extends 'pages/base.html' %}
{% load static %}
{% block title %}문서 작성{% endblock %}

{% block content %}
<style>
  :disabled{
    background-color: var(--secondary-200);
  }

  .icons{
    cursor: pointer;
    width: 40px;
    height: 35px;
    /* filter: invert(100%) brightness(200%); */
  }
  
  .big{
    width: 80px;
    height: 70px;
  }
</style>

<div class="page-title">
    <div class="gradient-bar"></div>
    문서 작성: {{ docnm }}
</div>

<div style="display: flex; gap: 20px; min-height: 80%;">
  <!-- 좌측 패널 -->
  <div style="flex: 1; border-right: 1px solid #ddd; padding-right: 20px;">
    <h3>문서 구성</h3>
    <!-- 작성문서 명 -->
     <div div class="form-group-left">
        <label>작성 문서명</label>
        <input class="input" for="docnm"  id="docnm" name="docnm" style="height: 25px;" placeholder="작성문서명을 입력하시오." >
     </div>
  </div>

<!-- 우측 패널 -->
<div style="flex: 2; padding-left: 20px;">
  <h3>매개변수 입력</h3>
  <form method="post" id="data_form">
    {% csrf_token %}
    <input type="hidden" id="docid_inp" value="{{ docid }}">
    <!-- 매개변수 테이블 영역 -->
    <table class="table  table-sm">
      <thead>
        <tr>
          <th style="width: 30%;">매개변수명</th>
          <th style="width: 35%;">예시값</th>
          <th style="width: 35%;">입력값</th>
        </tr>
      </thead>
      <tbody>
        {% for param in dataparams %}
        <tr>
          <td>
            {{ param.paramnm }}
            <input type="hidden" name="paramnm_{{ forloop.counter0 }}" value="{{ param.paramnm }}">
            <input type="hidden" name="paramuid_{{ forloop.counter0 }}" value="{{ param.paramuid }}">
            <input type="hidden" name="orderno_{{ forloop.counter0 }}" value="{{ param.orderno }}">
          </td>
          <td>{{ param.samplevalue }}</td>
            <td>
              <input type="text" name="param_value_{{ forloop.counter0 }}" 
                    value="{{ param.value|default_if_none:'' }}" 
                    class="form-control param-value-input" 
                    data-paramnm="{{ param.paramnm}}">
            </td>
          </tr>
        {% empty %}
        <tr>
          <td colspan="3" style="text-align: center;">매개변수가 없습니다.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <!-- 몇 개의 파라미터가 있는지 전달 -->
    <input type="hidden" name="param_count" value="{{ dataparams|length }}">

    <!-- 저장 버튼 -->
    <div class="button-group">
      <!-- <button type="button" class="btn btn-primary" id="SaveData" disabled>-문서 일괄 작성(준비 중)-</button> -->
      <button type="button" style="border: none; background-color: transparent;" id="SaveData" disabled ><img src="{% static 'icons/doc-writing-unscreen.gif' %}" class="icons" title="문서 일괄 작성(준비중)"/></button>
      <button type="button" style="border: none; background-color: transparent;" id="SaveForm" ><img src="{% static 'icons/save-96.png' %}" class="icons" title="구성 저장"/></button>
    </div>
  </form>
</div>

<script>
  // 문서 일괄 작성
  document.getElementById("SaveData").addEventListener("click", async function() {
    alert('여기에 곧 동작이 추가 될 예정입니다.')

    gendocuid = '{{ row.gendocuid }}'
    type = 'auto'
    // const url = `/req/chapter_read/?sep=doc&type=${type}&gendocuid=${gendocuid}`;
    // window.open(url);
    // location.href = url;
    // console.log(url);
  });

  // 양식 저장
  document.getElementById("SaveForm").addEventListener("click", async function() {
    const form = document.getElementById("data_form");
    const formData = new FormData(form);
    const paramCount = parseInt(formData.get("param_count"));

    const jsonArray = [];

    for (let i = 0; i < paramCount; i++) {
        jsonArray.push({
            paramuid: formData.get(`paramuid_${i}`),
            paramnm: formData.get(`paramnm_${i}`),
            orderno: formData.get(`orderno_${i}`),
            paramvalue: formData.get(`param_value_${i}`)
        });
    }

    const docid = "{{ request.session.user.docid }}";
    const docnm = document.getElementById("docnm").value;

    if (!docnm) {
        alert("문서 명을 입력해주세요.");
        return;
    }

    try {
      // ✅ 첫 번째 요청: req_doc_check_objects
      const res1 = await fetch('/req/req_doc_check_objects/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            docid: docid
        })
      });

    const data1 = await res1.json();
    // console.log("첫 번째 결과:", data1);

    if (data1.success) {
      if (data1.message === "항목 미설정 존재") {
        const unusedList = data1.objects.map(obj => obj.text);
        alert(`항목 미설정 존재:\n\n${unusedList.join('\n')}`);
      }
    }

    const btn = document.getElementById('SaveData');

    // ✅ 두 번째 요청: req_doc_check_params (첫 번째 완료 후 실행)
    const res2 = await fetch('/req/req_doc_check_params/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({
            docid: docid,
            docnm: docnm,
            params: jsonArray
        })
      })
      .then(response => response.json())
      .then(data => {
          console.log(data)
          if (data.success){
            // console.log(data.message)
            if (data.message === "데이터존재") {
              const confirmed = confirm('문서명 및 매개변수 값이 이미 존재하고 있습니다.\n그래도 진행하시겠습니까??')
              
              if(!confirmed){
                alert('작업을 취소 합니다.')
                return;
              }
              else {
                alert('작업을 진행 합니다.')
                fetch('/req/req_doc_save_params/', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json',
                      'X-CSRFToken': '{{ csrf_token }}'
                  },
                  body: JSON.stringify({
                      docid: docid,
                      docnm: docnm,
                      params: jsonArray
                  })
                })
                .then(response => response.json())
                .then(data => {
                  if (data.success){  
                    alert('작성 완료 되었습니다.')
                    // alert(data.message)
                    // window.location.href = "{% url 'req_doc_list' %}?docid={{ request.session.user.docid }}";
                      
                    btn.disabled = false;
                  }
                  else {
                    alert(data.message)
                  }
                })
                .catch(error => {
                  alert('데이터 저장 중 오류가 발생했습니다: ' + error.message, 'error');
                })
              }
            }
            else {
              // alert(data.message)
              fetch('/req/req_doc_save_params/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    docid: docid,
                    docnm: docnm,
                    params: jsonArray
                })
              })
              .then(response => response.json())
              .then(data => {
                if (data.success){  
                  alert('작성 완료 되었습니다.')
                  // alert(data.message)
                  // window.location.href = "{% url 'req_doc_list' %}?docid={{ request.session.user.docid }}";
                  // window.location.reload()
                  
                  btn.disabled = false;
                }
                else {
                  alert(data.message)
                }
              })
              .catch(error => {
                alert('데이터 저장 중 오류가 발생했습니다: ' + error.message, 'error');
              })
            }

          } else {
            alert(data.message)
          }
      })
      .catch(error => {
          alert('저장 중 오류가 발생했습니다: ' + error.message, 'error');
      });

    } catch(error){
      alert('저장 중 오류가 발생했습니다: ' + error.message, 'error');
    }


  });
</script>
{% endblock %}
