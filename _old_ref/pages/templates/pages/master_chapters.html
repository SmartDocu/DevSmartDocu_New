{% extends 'pages/base.html' %}
{% block title %}챕터 관리{% endblock %}

{% load static %}

{% block content %}
<div class="page-title">
  <div style="display: flex; align-items: center;">
    <div class="gradient-bar"></div>
    <div>챕터 관리</div>
  </div>
  <button type="button" class="icon-btn" id="back-btn">
    <img src="{% static 'icons/back.svg' %}" alt="뒤로가기" class="icon-img config-icon">
  </button>
</div>


<!-- <form method="get" action="" class="form-filter">
  <label for="docid">대상 문서:</label>
  <select name="docid" id="docid" required onchange="this.form.submit()">
    {% for doc in docs %}
      <option value="{{ doc.docid }}" {% if docid|stringformat:"s" == doc.docid|stringformat:"s" %}selected{% endif %}>{{ doc.docnm }}</option>
    {% endfor %}
  </select>
</form> -->

<div style="display: flex; gap: 30px; padding-right: 10px;">
  <!-- 왼쪽 -->
<div style="flex: 30%; padding-right: 20px;">
  <h3>챕터 목록</h3>
  <div class="chapter-card-container">
    {% for chapter in chapters %}
      <div class="chapter-card" 
           data-chapteruid="{{ chapter.chapteruid }}"
           data-chapternm="{{ chapter.chapternm|escape }}"
           data-chapterno="{{ chapter.chapterno }}"
           data-useyn="{{ chapter.useyn|yesno:'true,false' }}"
           data-template-nm="{{ chapter.chaptertemplatenm|default:''|escapejs }}"
           data-template-url="{{ chapter.chaptertemplateurl|default:'' }}">
        <div class="card-title">{{ chapter.chapternm }}</div>
      </div>
    {% endfor %}
  </div>
</div>

  <!-- 오른쪽 -->
<div style="flex: 50%; padding: 0 20px;"> 
    <h3>챕터 상세</h3>
    <form id="chapter-detail-form" enctype="multipart/form-data">
      <input type="hidden" name="chapteruid" id="chapteruid">
      
      <div class = "form-group"> 
        <label>챕터명:</label>
        <input type="text" name="chapternm" id="chapternm">
      </div>
      
      <div class = "form-group"> 
        <label>순번:</label>
        <input type="number" name="chapterno" id="chapterno">
      </div>

      <div class = "form-group"> 
        <label>사용:</label>
        <input type="checkbox" name="useyn" id="useyn">
      </div>

      <div class="form-group">
        <label>서식 파일 업로드(머리글, 바닥글):</label>
        <!-- 숨겨진 실제 파일 input -->
        <input type="file" name="templatefile" id="templatefile" style="display:none;">
        
        <!-- 현재 템플릿 및 업로드 버튼 -->
        <div style="display:flex; align-items:center; gap:10px;">
          <button type="button" id="upload-btn" class="icon-btn">
            <img src="{% static 'icons/upload.svg' %}" title="업로드" class="icon-img new-icon">
          </button>
          <span id="current-template-name">적용할 서식 파일 없음</span>
        </div>
      </div>

      <div class="form-group-left" style="justify-content: center; margin-bottom: 10px; gap: 20px;">
        {% if user.editbuttonyn == 'Y' %}
        <div class="button-group">
          <button id="reset-btn" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/new.svg' %}" class="icon-img new-icon" title="신규">
              <span class="icon-label">신규</span>
            </div>
          </button>

          <!-- 저장 버튼 -->
          <button id="save-btn" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/save.svg' %}" class="icon-img save-icon" title="저장">
              <span class="icon-label">저장</span>
            </div>
          </button>

          <!-- 삭제 버튼 -->
          <button id="delete-btn" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/delete.svg' %}" class="icon-img del-icon" title="삭제">
              <span class="icon-label">삭제</span>
            </div>            
          </button>
        </div>
        {% endif %}

        <!-- 이동 버튼 -->
        <div id="nav-buttons" class="button-group"  style="display: none;">
          <button id="btn-chapter_template" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/template-config.svg' %}" class="icon-img config-icon" title="챕터 템플릿 관리 이동">
              <span class="icon-label">템플릿 관리</span>
            </div>         
          </button>

          <button id="btn-object" type="button" class="icon-btn">
            <div class="icon-wrapper">
              <img src="{% static 'icons/object-config.svg' %}" class="icon-img config-icon" title="항목 관리 이동">
              <span class="icon-label">항목 관리</span>
            </div>         
          </button>
        </div>
      </div>
    </form>
</div>

<div style="flex: 20%; padding-left: 20px;">
</div>

</div>

<script>
  // 🔹 파일 업로드 버튼 커스텀
const fileInput = document.getElementById('templatefile');
const uploadBtn = document.getElementById('upload-btn');
const templateNameSpan = document.getElementById('current-template-name');

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) {
    templateNameSpan.textContent = fileInput.files[0].name;
  } else {
    templateNameSpan.textContent = "적용할 서식 파일 없음";
  }
});


document.querySelectorAll(".chapter-card").forEach(card => {
  card.addEventListener("click", function () {
    // 🔹 기존 선택 제거
    document.querySelectorAll(".chapter-card").forEach(c => c.classList.remove("selected"));

    // 🔹 현재 선택 카드 강조
    this.classList.add("selected");

    const chapteruid = this.dataset.chapteruid;
    const chapternm = this.dataset.chapternm;
    const chapterno = this.dataset.chapterno;
    const useyn = this.dataset.useyn === "true";
    const templateNm = this.dataset.templateNm;
    const templateUrl = this.dataset.templateUrl;

    document.getElementById("chapteruid").value = chapteruid;
    document.getElementById("chapternm").value = chapternm;
    document.getElementById("chapterno").value = chapterno;
    document.getElementById("useyn").checked = useyn;

    const span = document.getElementById("current-template-name");
    if (templateNm && templateUrl) {
      span.innerHTML = `<a href="#" id="template-download-link">${templateNm}</a>`;
      document.getElementById("template-download-link").addEventListener("click", async e => {
        e.preventDefault();
        try {
          const res = await fetch(templateUrl);
          if (!res.ok) throw new Error("파일을 불러올 수 없습니다.");
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = templateNm;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (err) {
          console.error(err);
          alert("다운로드 실패: " + err.message);
        }
      });
    } else {
      span.textContent = "적용할 서식 파일 없음";
    }

    showActionButtons(chapteruid);
  });
});

const resetBtn = document.getElementById("reset-btn");
if (resetBtn) {
  resetBtn.addEventListener("click", () => { 
    document.getElementById("chapter-detail-form").reset();
    document.getElementById("chapteruid").value = "";
    document.getElementById("current-template-name").textContent = "적용할 서식 파일 없음";

    // 🔹 선택된 카드 해제
    document.querySelectorAll(".chapter-card").forEach(c => c.classList.remove("selected"));

    // 🔹 템플릿 관리 / 항목 관리 버튼 숨기기
    document.getElementById("nav-buttons").style.display = "none";
    
  });
}

const saveBtn = document.getElementById("save-btn");
if (saveBtn) {
  saveBtn.addEventListener("click", () => { 
    const chapterno = document.getElementById("chapterno").value;

    if (!chapterno || isNaN(chapterno)) {
      alert("순번을 입력해주세요.");
      document.getElementById("chapterno").focus();
      return;
    }

    const form = document.getElementById("chapter-detail-form");
    const formData = new FormData(form);

    // formData.append("docid", document.getElementById("docid").value);
    formData.set("useyn", document.getElementById("useyn").checked);

    fetch("{% url 'master_chapters_save' %}", {
      method: "POST",
      body: formData,
      headers: {
        "X-CSRFToken": getCookie("csrftoken")
      }, 
      credentials: "include"  // ✅ 세션 쿠키 포함
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === "success") {
        alert("저장되었습니다.");
        location.reload();
      } else {
        alert("저장 실패: " + (data.message || "서버 오류"));
      }
    })
    .catch(err => {
      alert("오류 발생: " + err.message);
    });
  });
}

const deleteBtn = document.getElementById("delete-btn");
if (deleteBtn) {
  deleteBtn.addEventListener("click", () => {     
    const chapteruid = document.getElementById("chapteruid").value;
    // const docid = document.getElementById("docid").value;

    if (!chapteruid) {
      alert("삭제할 챕터를 선택하세요.");
      return;
    }

    if (!confirm("정말 삭제하시겠습니까?")) return;

    fetch("{% url 'master_chapters_delete' %}", {
      method: "POST",
      credentials: "include",   // 👈 여기
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCookie("csrftoken")
      },
      // body: JSON.stringify({ chapteruid, docid })
      body: JSON.stringify({ chapteruid })
    })
    .then(res => res.json())
    .then(data => {
      if (data.result === "success") {
        alert("삭제되었습니다.");
        location.reload();
      } else {
        alert("삭제 실패: " + (data.message || "서버 오류"));
      }
    })
    .catch(error => alert("오류 발생: " + error.message));
  });
}

function showActionButtons(chapteruid) {
  const navButtons = document.getElementById("nav-buttons");
  navButtons.style.display = "flex";

  // const docid = document.getElementById("docid").value;
  document.getElementById("btn-chapter_template").onclick = () => {
    sessionStorage.setItem('master_chapters_chapteruid', chapteruid)

    url = "{% url 'master_chapter_template' %}?chapteruid=" + chapteruid;
    // window.open(url)
    window.location.href = url;   // ✅ 현재 탭 이동
  };
  document.getElementById("btn-object").onclick = () => {
    
    const chapteruid = document.getElementById("chapteruid").value;
    sessionStorage.setItem("chapter_object_chapteruid", chapteruid)

    const url =
      "{% url 'master_object' %}" +
      "?chapteruid=" + chapteruid;

    window.location.href = url;
  };
}

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.startsWith(name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const chapteruidFromUrl = params.get("chapteruid");

  // console.log("URL chapteruid:", chapteruidFromUrl);

  if (!chapteruidFromUrl) return;

  const targetCard = document.querySelector(
    `.chapter-card[data-chapteruid="${chapteruidFromUrl}"]`
  );

  if (!targetCard) {
    console.warn("해당 chapteruid 카드 못 찾음:", chapteruidFromUrl);
    return;
  }

  // 🔹 기존 선택 제거
  document.querySelectorAll(".chapter-card").forEach(c =>
    c.classList.remove("selected")
  );

  // 🔹 카드 클릭 트리거 (상세 영역까지 자동 세팅됨)
  targetCard.click();

  // console.log("chapter 카드 자동 선택 완료:", chapteruidFromUrl);

  sessionStorage.removeItem("chapter_object_chapteruid")
});

</script>

{% endblock %}
