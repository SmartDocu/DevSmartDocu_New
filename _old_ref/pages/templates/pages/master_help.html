{% extends 'pages/base.html' %}

{% block title %}
헬프 편집기
{% endblock %}

{% load static %}
{% block content %}
<style>
  thead th {
      background-color: transparent !important;
      color: black;
      font-weight: normal;
  }
  th, td {
      padding: 0px !important;
  }
  tbody tr:nth-child(even){
      background-color: transparent;
  }
  body tr:hover {
      background-color: transparent;
  }
</style>
  <!-- Vite dev 서버 연결 시 -->
  <script src="{% static 'ckeditor/ckeditor.js' %}"></script>
  <div class="page-title">
  <div style="display: flex; align-items: center;">
    <div class="gradient-bar"></div>
    <div>도움말 관리</div>
  </div>
</div>

  <!-- 1️⃣ STATIC_URL 먼저 정의 -->
<script>
  sessionStorage.removeItem('chapter_template_chapteruid')
  
  window.STATIC_URL = "{% static '' %}";
  
  window.__INITIAL_DATA__ = {{initial_data}};
</script>

<!-- 2️⃣ Vue 빌드 파일 불러오기 -->
<!-- 개발 환경: Vite dev server에서 Vue 앱 실행 -->
<!-- <script type="module" src="http://localhost:5173/src/main.js"></script> -->
<!-- 배포 환경: 빌드된 Vue 앱 JS 로딩 -->
<link rel="stylesheet" href="{% static 'vue/assets/index.css' %}">
<script type="module" src="{% static 'vue/assets/index.js' %}"></script>

<div id="master_help" style="width: 100%;" data-editbuttonyn="{{ editbuttonyn }}"></div>

{% endblock %}
