{% extends 'pages/base.html' %}
{% load static %}
{% load custom_filters %}

{% block title %}샘플 프롬프트 관리{% endblock %}

{% block content %}


<style>
.cmap-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.cmap-name {
    font-size: 0.85rem;
    font-weight: 600;
}

.cmap-box {
    height: 28px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* 20251216 추가 시작 */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.btn-loading {
    position: relative;
    pointer-events: none;
    opacity: 0.7;
}

.btn-loading .btn-spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid #ffffff;
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 1s ease-in-out infinite;
    margin-right: 6px;
}
.info{
    text-align: center;
}
/* 20251216 추가 끝 */
</style>


<div class="page-title">
  <div class="filter-item" >
    <div class="gradient-bar"></div>
    샘플 프롬프트 관리
  </div> 
</div>

<div style="overflow-y: auto">        
    <div style="display: flex; flex-direction: column; height: calc(100vh - 240px - 20px); box-sizing: border-box; gap: 10px;">

        <!-- 상단 필터 영역 -->
        <form method="get" action="" id="filter-form">
            <div style="flex: 2; display: flex; flex-direction: column; gap: 15px;">
                
                <!-- ✅ 첫 번째 줄: 샘플 프롬프트 불러오기 + 이름 입력 -->
                <div style="display: flex; gap: 20px;">

                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center;">
                            <label for="object_type" style="width: 120px; flex-shrink: 0;"><strong>개체 유형 :</strong></label>
                            <select id="object_type" name="object_type" style="flex: 1; margin-right: 20px;">
                                <option value="CA" {% if object_type == 'CA' %}selected{% endif %}>차트 (Chart)</option>
                                <option value="SA" {% if object_type == 'SA' %}selected{% endif %}>문장 (Sentence)</option>
                                <option value="TA" {% if object_type == 'TA' %}selected{% endif %}>테이블 (Table)</option>
                            </select>
                        </div>
                    </div>

                    <div style="flex: 1;">
                        <!-- 차트 유형 -->
                        <div id="chart_type_row" style="{% if object_type != 'CA' %}display: none;{% endif %}">
                            <div style="display: flex; align-items: center;">
                                <label for="chart_type" style="width: 180px; flex-shrink: 0;"><strong>차트 유형 :</strong></label>
                                <select id="chart_type" name="chart_type" style="flex: 1; margin-right: 20px;">
                                    <option value="">--- 선택 ---</option>
                                    <option value="bar" {% if request.GET.chart_type == 'bar' %}selected{% endif %}>Bar Chart</option>
                                    <option value="line" {% if request.GET.chart_type == 'line' %}selected{% endif %}>Line Chart</option>
                                    <option value="pie" {% if request.GET.chart_type == 'pie' %}selected{% endif %}>Pie Chart</option>
                                    <option value="scatter" {% if request.GET.chart_type == 'scatter' %}selected{% endif %}>Scatter</option>
                                    <option value="boxplot" {% if request.GET.chart_type == 'boxplot' %}selected{% endif %}>Box Plot</option>
                                    <option value="histogram" {% if request.GET.chart_type == 'histogram' %}selected{% endif %}>Histogram</option>
                                    <option value="dual_axis" {% if request.GET.chart_type == 'dual_axis' %}selected{% endif %}>Dual Axis</option>
                                    <option value="heatmap" {% if request.GET.chart_type == 'heatmap' %}selected{% endif %}>Heatmap</option>
                                    <option value="subplot" {% if request.GET.chart_type == 'subplot' %}selected{% endif %}>Subplot</option>
                                </select>
                            </div>
                        </div>

                        <!-- 문장 유형 -->
                        <div id="sentence_type_row" style="{% if object_type != 'SA' %}display: none;{% endif %}">
                            <div style="display: flex; align-items: center;">
                                <label for="sentence_type" style="width: 180px; flex-shrink: 0;"><strong>문장 유형 :</strong></label>
                                <select id="sentence_type" name="sentence_type" style="flex: 1; margin-right: 20px;">
                                    <option value="">--- 선택 ---</option> 
                                    <option value="simple_question" {% if request.GET.sentence_type == 'simple_question' %}selected{% endif %}>단순 질의</option>
                                    <option value="summary" {% if request.GET.sentence_type == 'summary' %}selected{% endif %}>요약</option>
                                    <option value="report" {% if request.GET.sentence_type == 'report' %}selected{% endif %}>보고서</option>
                                    <option value="predict" {% if request.GET.sentence_type == 'predict' %}selected{% endif %}>예측</option>
                                </select>
                            </div>
                        </div>

                        <!-- 테이블 유형 -->
                        <div id="table_type_row" style="{% if object_type != 'TA' %}display: none;{% endif %}">
                            <div style="display: flex; align-items: center;">
                                <label for="table_type" style="width: 180px; flex-shrink: 0;"><strong>테이블 유형 :</strong></label>
                                <select id="table_type" name="table_type" style="flex: 1; margin-right: 20px;">
                                    <option value="">--- 선택 ---</option> 
                                    <option value="table" {% if request.GET.table_type == 'table' %}selected{% endif %}>테이블</option>
                                </select>
                            </div>
                        </div>
                    </div>


                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center;">
                            <label for="promptnm" style="width: 180px; flex-shrink: 0;"><strong>샘플 프롬프트 불러오기 :</strong></label>
                            <select name="promptnm" id="promptnm" style="flex: 1; margin-right: 20px;">
                                <option value="">--- 선택 ---</option>
                                {% for prompt in prompts %}
                                    <option value="{{ prompt.promptnm }}"
                                            {% if prompt.promptnm == selected_promptnm %}selected{% endif %}
                                            data-promptuid="{{ prompt.promptuid }}"
                                            data-prompt="{{ prompt.prompt|escape }}"
                                            data-desc="{{ prompt.desc|escape }}"
                                            data-displaytype="{{ prompt.displaytype|default:'' }}">
                                        {{ prompt.promptnm }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                </div>

                <!-- ✅ 두 번째 줄: 데이터 목록 + 개체 타입 + 유형 -->
                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center;">
                            <label for="datauid" style="width: 120px; flex-shrink: 0;"><strong>데이터 목록 :</strong></label>
                            <select id="datauid" name="datauid" required onchange="this.form.submit()" style="flex: 1; margin-right: 20px;">
                                <option value="">--- 선택 ---</option>
                                {% for data in datas %}
                                    <option value="{{ data.datauid }}" {% if data.datauid|stringformat:"s" == datauid|stringformat:"s" %}selected{% endif %}>
                                        {{ data.datanm }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div style="flex: 1;">
                        <div style="display: flex; align-items: center;">
                            <label for="promptnm_input" style="width: 180px; flex-shrink: 0;"><strong>샘플 프롬프트 이름 :</strong></label>
                            <input type="text" id="promptnm_input" 
                                   value="{{ selected_promptnm }}"
                                   placeholder="신규 프롬프트 이름 입력"
                                   style="flex: 1; margin-right: 20px; padding: 6px; border: 1px solid #ccc; border-radius: 4px;">
                        </div>
                    </div>
                    
                    <div style="flex: 1;">
                        <!-- 빈 공간 -->
                    </div>
                </div>
            </div>
        </form>

        <div style="margin-top: 10px; margin-bottom: 10px; display: flex; gap: 20px; flex-wrap: wrap;">
            <div id="column-list-output" style="align-self: center; color: #333;"><strong>열이름  </strong></div>
        </div>

        <!-- 하단 80% -->
        <div style="flex: 8; display: flex; flex-direction: row; gap: 20px; min-height: 0;">
            <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <h4 style="margin-bottom: 10px; font-weight: bold; flex-shrink: 0;">프롬프트 설명</h4>
                <form id="prompt-desc-form" method="POST" 
                    style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                    <textarea name="prompt_desc" id="prompt_desc"
                            style="flex: 1; min-height: 0; width: 100%; padding: 8px; font-size: 1rem; 
                                    box-sizing: border-box; resize: none; border: 1px solid #ccc; 
                                    background-color: #f8f9fa; border-radius: 4px;">{{ prompt_desc }}</textarea>
                </form>

                <div id="color-button-area" style="margin-top:8px; display:flex; gap:24px; align-items:center;">
                    <label style="width: 80px; flex-shrink: 0;">색 참조</label>
                    <button type="button" id="toggle-css-colors" aria-expanded="false"
                            style="width: 100px; padding:6px 10px; border-radius:6px; border:1px solid #ccc;
                                background:#fff; cursor:pointer;">
                        색상 보기
                    </button>
                    
                    <button type="button" id="toggle-colormap" aria-expanded="false"
                            style="width: 120px; padding:6px 10px; border-radius:6px; border:1px solid #ccc;
                                background:#fff; cursor:pointer;">
                        컬러맵 보기
                    </button>
                </div>

                <div id="css-colors-wrapper"
                    style="display:none; margin-top:10px; padding:10px; border-radius:8px;
                            border:1px solid #ddd; background:#fff; max-height:180px; overflow:auto;">
                    <div style="font-weight:bold; margin-bottom:10px;">색상 샘플</div>
                    <div id="css-colors-container"
                        style="display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
                                gap:8px;">
                    </div>
                </div>

                <div id="colormap-wrapper"
                    style="display:none; margin-top:10px; padding:10px; border-radius:8px;
                            border:1px solid #ddd; background:#fff; max-height:180px; overflow:auto;">
                    <div style="font-weight:bold; margin-bottom:10px;">컬러맵 샘플</div>
                    <div id="colormap-container"
                        style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
                                gap:12px;">
                    </div>
                </div>

            </div>

            <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                    <h4 style="margin-bottom: 10px; font-weight: bold; flex-shrink: 0;">프롬프트</h4>
                    <form id="prompt-form" method="POST" 
                        style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                        <textarea name="prompt" id="prompt" 
                                placeholder="예: 2024년 월별 생산수량에 대해 그래프를 그려주세요(표를 만들어 주세요, 분석해주세요)." 
                                style="flex: 1; min-height: 0; width: 100%; padding: 8px; font-size: 1rem; 
                                        box-sizing: border-box; resize: none; border: 1px solid #ccc; 
                                        background-color: #f8f9fa; border-radius: 4px;">{{ prompt }}</textarea>
                    </form>
                </div>
            </div>

            <div style="flex: 1.5; display: flex; flex-direction: column; min-height: 0;">
                <div style="flex: 1; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden;">
                    <h4 style="margin-bottom: 10px; font-weight: bold; flex-shrink: 0;">미리보기 결과</h4>
                    <div id="output-box" style="flex: 1; width: 100%; overflow: auto; padding: 8px; 
                                                box-sizing: border-box; border: 1px solid #ccc; 
                                                border-radius: 4px; background-color: #f8f9fa;
                                                white-space: pre-wrap;  min-height: 0;;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 버튼들 -->
    <div class="button-group">
        <button id="btn-prompt-sample-reset" type="button" class="icon-btn">
            <div class="icon-wrapper">
                <img src="{% static 'icons/new.svg' %}" class="icon-img new-icon" id="btn-reset" title="신규">
                <span class="icon-label">신규</span>
            </div>
        </button>
        <button id="btn-prompt-sample-save" type="button" class="icon-btn">
            <div class="icon-wrapper">
                <img src="{% static 'icons/save.svg' %}" class="icon-img save-icon" title="저장"/>
                <span class="icon-label">저장</span>
            </div>
        </button>
        <button id="btn-prompt-sample-delete" type="button" class="icon-btn">
            <div class="icon-wrapper">
                <img src="{% static 'icons/delete.svg' %}" class="icon-img del-icon" title="삭제"/>
                <span class="icon-label">삭제</span>
            </div>
        </button>
        <button id="btn-prompt-form" type="button" class="icon-btn">
            <div class="icon-wrapper">
                <img src="{% static 'icons/view.svg' %}" class="icon-img config-icon" title="미리보기"/>
                <span class="icon-label">미리보기</span>
            </div>
        </button>
    </div>

    <div id="preview_prompt" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; justify-content: center; align-items: center; background-color: rgba(0, 0, 0, 0.5); z-index: 9999;">
        <div class="loading-content">
            <div class="spinner"></div>
            <div id="run_prompt" style="text-align: center;"></div>
            <div>잠시만 기다려 주세요.</div>
        </div>
    </div>
</div>


<script src="{% static 'js/ai_actions.js' %}"></script>
<script>

document.addEventListener("DOMContentLoaded", function() {
        
    // ✅ 컬러맵 초기화 (ai_actions.js에서 불러옴)
    if (typeof initColormapFeature === 'function') {
        initColormapFeature();
    }

    const objectTypeSelect = document.getElementById("object_type");
    const chartTypeSelect = document.getElementById("chart_type");
    const sentenceTypeSelect = document.getElementById("sentence_type");
    const tableTypeSelect = document.getElementById("table_type");
    const promptSelect = document.getElementById("promptnm");
    const promptNameInput = document.getElementById("promptnm_input");
    const promptTextarea = document.getElementById("prompt");
    const promptDescTextarea = document.getElementById("prompt_desc");
    
    const chartRow = document.getElementById("chart_type_row");
    const sentenceRow = document.getElementById("sentence_type_row");
    const tableRow = document.getElementById("table_type_row");

    let displayType = "";

    // ✅ 페이지 로드 시 프롬프트 목록 자동 로딩
    loadPrompts();

    // ✅ 프롬프트 목록을 가져오는 함수 (display_type 제거)
    function loadPrompts() {
        const objectType = objectTypeSelect.value;
        
        if (!objectType) {
            return;
        }

        // fetch(`/master/get_prompts/?object_type=${objectType}`)
        // displaytype 가져오기
        let displaytype = "";
        if (objectType === "CA") {
            displaytype = chartTypeSelect.value;
        } else if (objectType === "SA") {
            displaytype = sentenceTypeSelect.value;
        } else if (objectType === "TA") {
            displaytype = tableTypeSelect.value;
        }
        
        // URL 구성
        let url = `/master/get_prompts/?object_type=${objectType}`;
        if (displaytype) {
            url += `&displaytype=${displaytype}`;
        }
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                const currentValue = promptSelect.value;
                promptSelect.innerHTML = '<option value="">--- 선택 ---</option>';
                
                data.prompts.forEach(prompt => {
                    const option = document.createElement('option');
                    option.value = prompt.prompt_nm;
                    option.textContent = prompt.prompt_nm;
                    option.dataset.promptuid = prompt.promptuid;
                    option.dataset.prompt = prompt.prompt_text;
                    option.dataset.desc = prompt.prompt_desc;
                    option.dataset.displaytype = prompt.display_type;
                    
                    if (prompt.prompt_nm === currentValue) {
                        option.selected = true;
                    }
                    
                    promptSelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error('프롬프트 로딩 에러:', error);
            });
    }

    function attachPreviewBtnListener() {
        const previewBtn = document.getElementById("btn-prompt-form");
        if (previewBtn) {
    //        previewBtn.onclick = function (e) {
            previewBtn.addEventListener("click", function (e) {
                e.preventDefault();

                const prompt_text = document.getElementById("prompt").value.trim();
                const outputArea = document.getElementById("output-box");
                showPromptLoading();

                fetch('{% url "ai_prompt_llm_preview" %}', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: new URLSearchParams({
                        "datauid": document.getElementById("datauid").value,
                        "prompt": prompt_text,
                        "object_type": document.getElementById("object_type").value
                    }),
                    credentials: "include"
                })
                .then(res => res.json())
                .then(data => {
                    hidePromptLoading();
                    outputArea.innerHTML = "";
                    if (data.message_type === "image") {
                        const img = document.createElement("img");
                        img.src = "data:image/png;base64," + data.image_data.trim();
                        img.style.maxWidth = "100%";
                        outputArea.appendChild(img);
                    } 
                    else if (data.message_type === "text") {
                        outputArea.innerText = data.message;
                    } 
                    else if (data.message_type === "table") {
                        const header_json = (typeof data.table_header_json === "string")
                            ? JSON.parse(data.table_header_json)
                            : data.table_header_json;
                        const data_json = (typeof data.table_data_json === "string")
                            ? JSON.parse(data.table_data_json)
                            : data.table_data_json;
                        renderPreviewTable(header_json, data_json, data.data)
                    } 
                    else if (data.message_type === "error") {
                        outputArea.innerHTML = `<div style="color:red;">오류: ${data.message}</div>`;
                    } 
                    else {
                        outputArea.innerHTML = `<div>결과가 없습니다.</div>`;
                    }
                })
                .catch(err => {
                    hidePromptLoading();
                    outputArea.innerHTML = `<div style="color:red;">에러: ${err.message}</div>`;
                });
            });
        }
    }



    // ✅ 개체 타입 변경 시
    objectTypeSelect.addEventListener("change", function() {
        const value = this.value;

        chartRow.style.display = "none";
        sentenceRow.style.display = "none";
        tableRow.style.display = "none";

        if (value === "CA") {
            chartRow.style.display = "block";
        } 
        else if (value === "SA") {
            sentenceRow.style.display = "block";
        }
        else if (value === "TA") {
            tableRow.style.display = "block";
        }

        // 하위 항목 초기화
        chartTypeSelect.value = "";
        sentenceTypeSelect.value = "";
        tableTypeSelect.value = "";
        
        // ✅ 프롬프트 목록 다시 로딩
        loadPrompts();
        
        promptSelect.value = "";
        promptNameInput.value = "";
        promptTextarea.value = "";
        promptDescTextarea.value = "";

        document.getElementById("filter-form").submit();    // jeff
    });

    // ✅ 프롬프트 선택 시 내용 표시 + 이름 input에도 반영 + promptuid 저장
    promptSelect.addEventListener("change", function() {
        const selectedOption = this.options[this.selectedIndex];
        
        if (selectedOption.value) {
            promptTextarea.value = selectedOption.dataset.prompt || "";
            promptDescTextarea.value = selectedOption.dataset.desc || "";
            promptNameInput.value = selectedOption.value;
            
            // ✅ promptuid 저장
            let hiddenPromptUid = document.getElementById("hidden_promptuid");
            if (!hiddenPromptUid) {
                hiddenPromptUid = document.createElement("input");
                hiddenPromptUid.type = "hidden";
                hiddenPromptUid.id = "hidden_promptuid";
                document.body.appendChild(hiddenPromptUid);
            }
            hiddenPromptUid.value = selectedOption.dataset.promptuid || "";
            
            // ✅ displaytype에 따라 차트/문장/테이블 유형 설정
            const displayType = selectedOption.dataset.displaytype;
            if (displayType) {
                if (objectTypeSelect.value === "CA") {
                    chartTypeSelect.value = displayType;
                } else if (objectTypeSelect.value === "SA") {
                    sentenceTypeSelect.value = displayType;
                } else if (objectTypeSelect.value === "TA") {
                    tableTypeSelect.value = displayType;
                }
            }
            const currentUrl = new URL(window.location);
            currentUrl.searchParams.set('promptnm', selectedOption.value);
            window.history.replaceState({}, '', currentUrl);

        } 
        else {
            promptTextarea.value = "";
            promptDescTextarea.value = "";
            promptNameInput.value = "";
            
            const currentUrl = new URL(window.location);
            currentUrl.searchParams.delete('promptnm');
            window.history.replaceState({}, '', currentUrl);

        }

        attachPreviewBtnListener();    // jeff 20251223 0940
    });


    // 차트 유형 변경 시
    chartTypeSelect.addEventListener("change", function() {
        loadPrompts();
        document.getElementById("filter-form").submit();
    });

    // 문장 유형 변경 시
    sentenceTypeSelect.addEventListener("change", function() {
        loadPrompts();
        document.getElementById("filter-form").submit();
    });

    // 테이블 유형 변경 시
    tableTypeSelect.addEventListener("change", function() {
        loadPrompts();
        document.getElementById("filter-form").submit();
    });    

    // === ✅ 신규 버튼 - 모든 영역 초기화 + promptuid 초기화 ===
    const resetBtn = document.getElementById("btn-prompt-sample-reset");
    if (resetBtn) {
        resetBtn.addEventListener("click", function() {
            promptSelect.value = "";
            promptNameInput.value = "";
            promptTextarea.value = "";
            promptDescTextarea.value = "";
            document.getElementById("output-box").innerHTML = "";
            
            // ✅ promptuid 초기화 (hidden input 있으면 제거)
            const hiddenPromptUid = document.getElementById("hidden_promptuid");
            if (hiddenPromptUid) {
                hiddenPromptUid.remove();
            }
        });
    }

    // === Preview 버튼 ===
    const previewBtn = document.getElementById("btn-prompt-form");
    if (previewBtn) {
        previewBtn.addEventListener("click", function (e) {
            e.preventDefault();

            const prompt_text = document.getElementById("prompt").value.trim();

            const outputArea = document.getElementById("output-box");
            // outputArea.innerHTML = '<div style="text-align:center; color:#666;">작성 중입니다...</div>';
            showPromptLoading();    // 20251216 추가

            fetch('{% url "ai_prompt_llm_preview" %}', {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: new URLSearchParams({
                    "datauid": document.getElementById("datauid").value,
                    "prompt": prompt_text,
                    "object_type": document.getElementById("object_type").value
                }),
                credentials: "include"
            })
            .then(res => res.json())
            .then(data => {
                hidePromptLoading();    // 20251216 추가
                outputArea.innerHTML = "";
                if (data.message_type === "image") {
                    const img = document.createElement("img");
                    img.src = "data:image/png;base64," + data.image_data.trim();
                    img.style.maxWidth = "100%";
                    outputArea.appendChild(img);
                } 
                else if (data.message_type === "text") {
                    outputArea.innerText = data.message;
                } 
                else if (data.message_type === "table") {
                    const header_json = (typeof data.table_header_json === "string")
                        ? JSON.parse(data.table_header_json)
                        : data.table_header_json;

                    const data_json = (typeof data.table_data_json === "string")
                        ? JSON.parse(data.table_data_json)
                        : data.table_data_json;

                    renderPreviewTable(
                        header_json,
                        data_json,
                        data.data
                    )
                } 
                else if (data.message_type === "error") {
                    outputArea.innerHTML = `<div style="color:red;">오류: ${data.message}</div>`;
                } 
                else {
                    outputArea.innerHTML = `<div>결과가 없습니다.</div>`;
                }
            })
            .catch(err => {
                hidePromptLoading();    // 20251216 추가
                outputArea.innerHTML = `<div style="color:red;">에러: ${err.message}</div>`;
            });
        });
    } 

    // === ✅ 샘플 프롬프트 저장 버튼 ===
    const saveBtn = document.getElementById("btn-prompt-sample-save");
    if (saveBtn) {
        saveBtn.addEventListener("click", function(e) {
            e.preventDefault();

            const objectType = document.getElementById("object_type").value;
            const datauid = document.getElementById("datauid").value;
            const prompt_text = document.getElementById("prompt").value.trim();
            const promptDesc = document.getElementById("prompt_desc").value.trim();
            const promptName = promptNameInput.value.trim();
            
            // ✅ promptuid 가져오기
            const hiddenPromptUid = document.getElementById("hidden_promptuid");
            // const promptuid = hiddenPromptUid ? hiddenPromptUid.value : null;
            const promptuid = (hiddenPromptUid && hiddenPromptUid.value) ? hiddenPromptUid.value : null;

            if (!promptName) {
                alert("샘플 프롬프트 이름을 입력해주세요.");
                return;
            }

            // displayType 결정
            let displayType = "";
            if (objectType === "CA") {
                displayType = chartTypeSelect.value;
            } else if (objectType === "SA") {
                displayType = sentenceTypeSelect.value;
            } else if (objectType === "TA") {
                displayType = tableTypeSelect.value;
            }

            // ✅ 저장 함수
            function savePrompt(forceUpdate = false) {
                fetch('{% url "ai_prompt_sample_save" %}', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: JSON.stringify({
                        datauid: datauid,
                        objecttypecd: objectType,
                        displaytype: displayType,
                        prompt: prompt_text,
                        promptnm: promptName,
                        promptdesc: promptDesc,
                        promptuid: promptuid,  // ✅ promptuid 전송
                        force_update: forceUpdate
                    }),
                    credentials: "include"
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message || "저장되었습니다.");
                        location.reload();
                    } else if (data.error === "confirm_update") {
                        // ✅ 수정 확인
                        if (confirm(data.message)) {
                            savePrompt(true);  // force_update = true로 재시도
                        }
                    } else {
                        alert("저장 실패: " + (data.message || data.error || "알 수 없는 오류"));
                    }
                })
                .catch(err => {
                    alert("저장 요청 중 오류가 발생했습니다: " + err.message);
                    console.error("전체 오류:", err);
                });
            }

            // 저장 실행
            savePrompt(false);
        });
    }

    // === 샘플 프롬프트 삭제 ===
    const deleteBtn = document.getElementById("btn-prompt-sample-delete");
    if (deleteBtn) {
        deleteBtn.addEventListener("click", function () {
            if (!confirm("정말 삭제하시겠습니까?")) {
                return;
            }

            const promptSelect = document.getElementById("promptnm");
            const selectedOption = promptSelect.options[promptSelect.selectedIndex];
            const promptuid = selectedOption.dataset.promptuid;

            if (!promptuid) {
                alert("삭제할 프롬프트를 선택해주세요.");
                return;
            }

            fetch("{% url 'ai_prompt_sample_delete' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({ promptuid: promptuid }),
                credentials: "include"
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert("삭제되었습니다.");
                    window.location.reload();
                } else {
                    alert("삭제 실패: " + (data.error || "알 수 없는 오류"));
                }
            })
            .catch(err => {
                alert("삭제 요청 중 오류 발생: " + err.message);
                console.error("삭제 에러:", err);
            });
        });
    }

    // === 열이름 로드 ===
    const datauidSelect = document.getElementById("datauid");
    
    if (datauidSelect && datauidSelect.value) {
        loadColumnListForPrompt();
    }
    
    if (datauidSelect) {
        datauidSelect.addEventListener("change", function() {
            if (this.value) {
                loadColumnListForPrompt();
            } else {
                document.getElementById("column-list-output").innerHTML = '<strong>열이름  </strong>';
            }
        });
    }

    function loadColumnListForPrompt() {
        const datauid = document.getElementById("datauid")?.value;
        
        if (!datauid) {
            document.getElementById("column-list-output").innerHTML = '<strong>열이름  </strong>';
            return;
        }
        
        document.getElementById("column-list-output").innerHTML = '<strong>열이름  </strong>로딩 중...';

        fetch("/master/ai_get_columns/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: new URLSearchParams({ "datauid": datauid }),
            credentials: "include"
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const outputDiv = document.getElementById("column-list-output");
                outputDiv.innerHTML = '<strong>열이름  </strong>';
                
                data.columns.forEach((col, index) => {
                    const colSpan = document.createElement("span");
                    colSpan.textContent = col;
                    colSpan.style.cursor = "pointer";
                    colSpan.style.padding = "4px 4px";
                    colSpan.style.marginRight = "4px";
                    colSpan.style.backgroundColor = "#e9ecef";
                    colSpan.style.borderRadius = "4px";
                    colSpan.style.display = "inline-block";
                    colSpan.style.marginBottom = "4px";
                    colSpan.style.backgroundColor = "transparent";
                    
                    if (index === 0) {
                        colSpan.style.marginLeft = "20px";
                    }
                    
                    // 호버 효과 (배경 대신 밑줄이나 색상 변경)
                    colSpan.addEventListener("mouseenter", function() {
                        this.style.textDecoration = "underline";
                        this.style.textDecorationColor = "silver";  // 밑줄 색상
                        this.style.color = "black";  // 글자 색상 (진하게)
                        this.style.fontWeight = "bold"
                    });
                    colSpan.addEventListener("mouseleave", function() {
                        this.style.textDecoration = "none";
                        this.style.color = "inherit";
                        this.style.fontWeight = "normal";
                    });
                    
                    // 클릭 시 textarea에 삽입
                    colSpan.addEventListener("click", function() {
                        insertTextAtCursor(col);
                    });
                    
                    outputDiv.appendChild(colSpan);
                });
            }

        })
        .catch(err => {
            document.getElementById("column-list-output").innerHTML = '<strong>열이름  </strong>에러';
        });
    }

});  // ✅ DOMContentLoaded 닫기


</script>

{% endblock %}
